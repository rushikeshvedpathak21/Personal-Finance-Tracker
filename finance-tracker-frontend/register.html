<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Finance Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Start tracking your finances today</p>

    <div id="registerAlert" class="alert"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Rushikesh Vedpathak" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="rushikesh123@gmail.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
