<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Finance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2> Finance Tracker</h2>
            <p id="userName">Loading...</p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon"></span> Dashboard</a>
            <a href="expenses.html" class="nav-item" data-page="expenses"><span class="icon"></span> Expenses</a>
            <a href="income.html" class="nav-item" data-page="income"><span class="icon"></span> Income</a>
            <a href="budget.html" class="nav-item" data-page="budget"><span class="icon"></span> Budget</a>
            <a href="transactions.html" class="nav-item active" data-page="transactions"><span class="icon"></span> Transactions</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn"><span></span> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Transaction History</h1>
            <p>All your income and expenses, sorted by date.</p>
        </div>

        
        <div class="filter-bar">
            <div class="form-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="all">All</option>
                    <option value="expense">Expenses Only</option>
                    <option value="income">Income Only</option>
                </select>
            </div>
            <div class="form-group">
                <label for="filterCategory">Category</label>
                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="groceries">Groceries</option>
                    <option value="utilities">Utilities</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="transportation">Transportation</option>
                    <option value="food">Food & Dining</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="filterKeyword">Search</label>
                <input type="text" id="filterKeyword" placeholder="Search description or source...">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button class="btn btn-outline" id="applyFilter">Search</button>
            </div>
        </div>

        
        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Category / Source</th>
                        <th>Description</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="transactionList">
                    <tr><td colspan="5"><div class="empty-state"><p>Loading...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="../js/utils.js"></script>
<script src="../js/transactions.js"></script>
</body>
</html>
