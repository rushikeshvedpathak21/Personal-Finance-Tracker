<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Finance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2> Finance Tracker</h2>
            <p id="userName">Loading...</p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon"></span> Dashboard</a>
            <a href="expenses.html" class="nav-item active" data-page="expenses"><span class="icon"></span> Expenses</a>
            <a href="income.html" class="nav-item" data-page="income"><span class="icon"></span> Income</a>
            <a href="budget.html" class="nav-item" data-page="budget"><span class="icon"></span> Budget</a>
            <a href="transactions.html" class="nav-item" data-page="transactions"><span class="icon"></span> Transactions</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn"><span></span> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Expenses</h1>
            <p>Track where your money is going.</p>
        </div>

        <div class="dashboard-grid">

            
            <div class="card">
                <h2>Add New Expense</h2>
                <div id="expenseAlert" class="alert"></div>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select category</option>
                            <option value="groceries">Groceries</option>
                            <option value="utilities">Utilities</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="transportation">Transportation</option>
                            <option value="food">Food & Dining</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description (optional)</label>
                        <textarea id="description" placeholder="What was this expense for?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Expense</button>
                </form>
            </div>

            
            <div class="card">
                <h2>My Expenses</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList">
                        <tr><td colspan="4"><div class="empty-state"><p>Loading...</p></div></td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>

<script src="../js/utils.js"></script>
<script src="../js/expenses.js"></script>
</body>
</html>
