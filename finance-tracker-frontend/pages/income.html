<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income - Finance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2> Finance Tracker</h2>
            <p id="userName">Loading...</p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon"></span> Dashboard</a>
            <a href="expenses.html" class="nav-item" data-page="expenses"><span class="icon"></span> Expenses</a>
            <a href="income.html" class="nav-item active" data-page="income"><span class="icon"></span> Income</a>
            <a href="budget.html" class="nav-item" data-page="budget"><span class="icon"></span> Budget</a>
            <a href="transactions.html" class="nav-item" data-page="transactions"><span class="icon"></span> Transactions</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn"><span></span> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Income</h1>
            <p>Record all your income sources.</p>
        </div>

        <div class="dashboard-grid">

            
            <div class="card">
                <h2>Add Income</h2>
                <div id="incomeAlert" class="alert"></div>
                <form id="incomeForm">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="source">Source</label>
                        <select id="source" required>
                            <option value="">Select source</option>
                            <option value="salary">Salary</option>
                            <option value="bonus">Bonus</option>
                            <option value="freelance">Freelance</option>
                            <option value="investment">Investment</option>
                            <option value="rental">Rental</option>
                            <option value="gift">Gift</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="incomeDate">Date</label>
                        <input type="date" id="incomeDate" required>
                    </div>
                    <div class="form-group">
                        <label for="frequency">Frequency</label>
                        <select id="frequency" required>
                            <option value="">Select frequency</option>
                            <option value="monthly">Monthly</option>
                            <option value="weekly">Weekly</option>
                            <option value="one-time">One-time</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Income</button>
                </form>
            </div>

           
            <div class="card">
                <h2>Income History</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Source</th>
                            <th>Amount</th>
                            <th>Frequency</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="incomeList">
                        <tr><td colspan="4"><div class="empty-state"><p>Loading...</p></div></td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>

<script src="../js/utils.js"></script>
<script src="../js/income.js"></script>
</body>
</html>
