<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget - Finance Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Finance Tracker</h2>
            <p id="userName">Loading...</p>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon"></span> Dashboard</a>
            <a href="expenses.html" class="nav-item" data-page="expenses"><span class="icon"></span> Expenses</a>
            <a href="income.html" class="nav-item" data-page="income"><span class="icon"></span> Income</a>
            <a href="budget.html" class="nav-item active" data-page="budget"><span class="icon"></span> Budget</a>
            <a href="transactions.html" class="nav-item" data-page="transactions"><span class="icon"></span> Transactions</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn"><span></span> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Budget</h1>
            <p>Set monthly limits and see how you're doing.</p>
        </div>

        <div class="dashboard-grid">

           
            <div class="card">
                <h2>Set Monthly Budget</h2>
                <div id="budgetAlert" class="alert"></div>
                <form id="budgetForm">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select category</option>
                            <option value="food">Food & Dining</option>
                            <option value="transportation">Transportation</option>
                            <option value="shopping">Shopping</option>
                            <option value="groceries">Groceries</option>
                            <option value="utilities">Utilities</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="health">Health</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="monthlyLimit">Monthly Limit ($)</label>
                        <input type="number" id="monthlyLimit" step="0.01" min="1" placeholder="500.00" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="month">Month</label>
                            <select id="month" required>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="year">Year</label>
                            <input type="number" id="year" min="2020" max="2030" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Budget</button>
                </form>
            </div>

            
            <div class="card">
                <h2>This Month's Budget</h2>
                <div id="budgetList">
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <p>No budgets set for this month</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="../js/utils.js"></script>
<script src="../js/budget.js"></script>
</body>
</html>
